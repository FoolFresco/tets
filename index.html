<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI Watcher</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --border: #1e1e1e;
    --accent: #00ff88;
    --accent2: #00ccff;
    --danger: #ff3355;
    --text: #e0e0e0;
    --muted: #444;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px;
    gap: 16px;
  }

  .header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: all 0.3s;
  }
  .status-dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 1.5s infinite; }
  .status-dot.thinking { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: pulse 0.6s infinite; }
  .status-dot.error { background: var(--danger); box-shadow: 0 0 8px var(--danger); }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .api-section {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .model-select-row {
    display: flex;
    gap: 8px;
  }

  select {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 10px 12px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }
  select:focus { border-color: var(--accent); }

  input[type="text"], input[type="password"], textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, textarea:focus { border-color: var(--accent); }

  textarea { resize: none; line-height: 1.5; }

  .prompt-toggle {
    font-size: 11px;
    color: var(--accent2);
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
    letter-spacing: 1px;
    text-align: left;
    padding: 0;
  }

  .prompt-section {
    display: none;
    flex-direction: column;
    gap: 8px;
  }
  .prompt-section.open { display: flex; }

  .camera-wrap {
    width: 100%;
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: #000;
    aspect-ratio: 4/3;
  }

  .cam-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 2px;
  }
  .cam-placeholder-icon {
    font-size: 32px;
    opacity: 0.3;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  canvas { display: none; }

  .cam-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .corner {
    position: absolute;
    width: 16px; height: 16px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.6;
  }
  .corner.tl { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 8px; right: 8px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 8px; left: 8px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .scanning .scan-line {
    opacity: 0.7;
    animation: scan 1.5s ease-in-out;
  }
  @keyframes scan {
    0% { top: 0%; }
    100% { top: 100%; }
  }

  .controls {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .interval-wrap {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }

  .interval-label {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  input[type="range"] {
    flex: 1;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .interval-val {
    font-size: 13px;
    color: var(--accent);
    min-width: 32px;
    text-align: right;
  }

  .btn {
    padding: 14px;
    border-radius: 8px;
    border: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-start {
    background: var(--accent);
    color: #000;
    font-weight: 700;
  }
  .btn-start:hover { opacity: 0.85; }
  .btn-start:disabled { background: var(--muted); color: #666; cursor: not-allowed; }

  .btn-stop {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
  }
  .btn-stop:hover { background: var(--danger); color: #fff; }
  .btn-stop:disabled { opacity: 0.3; cursor: not-allowed; }

  .log {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    min-height: 120px;
    max-height: 260px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .log-entry {
    font-size: 12px;
    line-height: 1.6;
    padding: 8px 10px;
    border-radius: 4px;
    border-left: 2px solid var(--border);
  }
  .log-entry.answer {
    border-left-color: var(--accent);
    color: var(--accent);
    background: rgba(0,255,136,0.04);
    font-size: 14px;
  }
  .log-entry.info { border-left-color: var(--muted); color: var(--muted); font-size: 11px; }
  .log-entry.err { border-left-color: var(--danger); color: var(--danger); }

  .log-empty {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 1px;
    text-align: center;
    margin: auto;
  }

  .speaking-bar {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .speaking-bar.active {
    opacity: 1;
  }
  .speaking-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    animation: speaking 1.2s ease-in-out infinite alternate;
    transform-origin: left;
  }
  @keyframes speaking {
    0% { width: 20%; }
    100% { width: 100%; }
  }

  .footer {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-align: center;
    padding-bottom: 10px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">AI // WATCHER</div>
  <div class="status-dot" id="statusDot"></div>
</div>

<div class="api-section">
  <div class="label">Gemini API Key</div>
  <input type="password" id="apiKey" placeholder="AIza..." autocomplete="off" />
  <div class="label" style="margin-top:2px">Модель</div>
  <div class="model-select-row">
    <select id="modelSelect">
      <option value="gemini-2.5-flash">gemini-2.5-flash</option>
      <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite (быстрее)</option>
      <option value="gemini-2.5-pro">gemini-2.5-pro (лучше)</option>
    </select>
  </div>
  <button class="prompt-toggle" onclick="togglePrompt()">⚙ настроить промпт</button>
  <div class="prompt-section" id="promptSection">
    <div class="label">Системный промпт</div>
    <textarea id="systemPrompt" rows="4">ANSWER ONLY. No questions, no explanations, no repeating text from screen. Output the single correct answer in 1-5 words. Nothing else. Ever.</textarea>
  </div>
</div>

<div class="camera-wrap" id="cameraWrap">
  <div class="cam-placeholder" id="camPlaceholder">
    <div class="cam-placeholder-icon">📷</div>
    <div>ИНИЦИАЛИЗАЦИЯ КАМЕРЫ...</div>
  </div>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div class="cam-overlay">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="scan-line" id="scanLine"></div>
  </div>
</div>

<div class="speaking-bar" id="speakingBar">
  <div class="speaking-bar-inner"></div>
</div>

<div class="controls">
  <div class="interval-wrap">
    <span class="interval-label">Интервал</span>
    <input type="range" id="intervalRange" min="5" max="30" value="10" oninput="updateInterval(this.value)">
    <span class="interval-val" id="intervalVal">10s</span>
  </div>
  <button class="btn btn-start" id="btnStart" onclick="startWatcher()">▶ Старт</button>
  <button class="btn btn-stop" id="btnStop" onclick="stopWatcher()" disabled>■ Стоп</button>
</div>

<div class="log" id="log">
  <div class="log-empty" id="logEmpty">// ожидание запуска</div>
</div>

<div class="footer">камера → gemini vision → голос</div>

<script>
  let stream = null;
  let intervalId = null;
  let isRunning = false;
  let intervalSec = 10;
  const synth = window.speechSynthesis;

  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const log = document.getElementById('log');
  const statusDot = document.getElementById('statusDot');
  const cameraWrap = document.getElementById('cameraWrap');
  const speakingBar = document.getElementById('speakingBar');
  const camPlaceholder = document.getElementById('camPlaceholder');

  function togglePrompt() {
    document.getElementById('promptSection').classList.toggle('open');
  }

  function updateInterval(v) {
    intervalSec = parseInt(v);
    document.getElementById('intervalVal').textContent = v + 's';
  }

  function setStatus(s) {
    statusDot.className = 'status-dot ' + s;
  }

  function addLog(text, type = 'info') {
    const empty = document.getElementById('logEmpty');
    if (empty) empty.remove();

    const el = document.createElement('div');
    el.className = 'log-entry ' + type;
    el.textContent = text;
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;

    while (log.children.length > 20) log.removeChild(log.firstChild);
  }

  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      video.srcObject = stream;
      camPlaceholder.style.display = 'none';
      return true;
    } catch (e) {
      camPlaceholder.innerHTML = '<div class="cam-placeholder-icon">⚠️</div><div>НЕТ ДОСТУПА К КАМЕРЕ</div>';
      addLog('Ошибка камеры: ' + e.message, 'err');
      return false;
    }
  }

  function captureFrame() {
    const w = video.videoWidth || 640;
    const h = video.videoHeight || 480;
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, w, h);
    return canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
  }

  function triggerScan() {
    cameraWrap.classList.add('scanning');
    setTimeout(() => cameraWrap.classList.remove('scanning'), 1600);
  }

  function speak(text) {
    if (!text || text.trim() === '') return;
    synth.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'en-US';
    utt.rate = 1.05;
    utt.pitch = 1;

    speakingBar.classList.add('active');
    utt.onend = () => speakingBar.classList.remove('active');
    utt.onerror = () => speakingBar.classList.remove('active');
    synth.speak(utt);
  }

  async function analyze() {
    const apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey) { addLog('Нет API ключа', 'err'); return; }

    triggerScan();
    setStatus('thinking');

    const imageData = captureFrame();
    const systemPrompt = document.getElementById('systemPrompt').value;
    const model = document.getElementById('modelSelect').value;
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

    try {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: {
            parts: [{ text: systemPrompt }]
          },
          contents: [{
            role: 'user',
            parts: [
              { inline_data: { mime_type: 'image/jpeg', data: imageData } },
              { text: 'What is the answer? Reply with the answer only, nothing else.' }
            ]
          }],
          generationConfig: {
            maxOutputTokens: 50,
            temperature: 0.1
          }
        })
      });

      const data = await response.json();

      if (data.error) {
        addLog('API: ' + data.error.message, 'err');
        setStatus('error');
        return;
      }

      const answer = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
      const shortAnswer = answer.split('\n')[0].slice(0, 120);

      if (shortAnswer && shortAnswer !== '?') {
        addLog(shortAnswer, 'answer');
        speak(shortAnswer);
      } else {
        addLog('[empty response from model]', 'info');
      }

      setStatus('active');
    } catch (e) {
      addLog('Ошибка: ' + e.message, 'err');
      setStatus('error');
    }
  }

  async function startWatcher() {
    const apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey) { addLog('Введи API ключ', 'err'); return; }

    if (!stream) {
      const ok = await startCamera();
      if (!ok) return;
    }

    isRunning = true;
    setStatus('active');
    document.getElementById('btnStart').disabled = true;
    document.getElementById('btnStop').disabled = false;
    addLog('Запущено. Интервал: ' + intervalSec + 's', 'info');

    await analyze();
    intervalId = setInterval(analyze, intervalSec * 1000);
  }

  function stopWatcher() {
    isRunning = false;
    clearInterval(intervalId);
    intervalId = null;
    synth.cancel();
    setStatus('');
    speakingBar.classList.remove('active');
    document.getElementById('btnStart').disabled = false;
    document.getElementById('btnStop').disabled = true;
    addLog('Остановлено', 'info');
  }

  // Автозапуск камеры при загрузке
  window.addEventListener('load', () => {
    if (synth.onvoiceschanged !== undefined) {
      synth.onvoiceschanged = () => synth.getVoices();
    }
    synth.getVoices();
    startCamera();
  });
</script>
</body>
</html>
